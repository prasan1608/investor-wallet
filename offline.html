<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2457a6">
<title>profes Offline</title>
<style>
body{
  margin:0;
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:24px;
  font-family:"Trebuchet MS","Segoe UI",Tahoma,Arial,sans-serif;
  color:#1d2230;
  background:
    radial-gradient(circle at top left, rgba(36,87,166,.16), transparent 28%),
    radial-gradient(circle at top right, rgba(143,190,62,.18), transparent 26%),
    linear-gradient(180deg, #ffffff 0%, #eef5fb 100%);
}
.card{
  width:min(540px,100%);
  padding:32px 28px;
  border-radius:28px;
  background:rgba(255,255,255,.82);
  border:1px solid rgba(210,223,242,.9);
  box-shadow:0 24px 60px rgba(24,33,52,.12);
  text-align:center;
}
img{
  width:min(180px,60vw);
  height:auto;
  margin-bottom:18px;
}
h1{
  margin:0 0 12px;
  font-size:32px;
  letter-spacing:-.04em;
}
p{
  margin:0;
  color:#64728a;
  line-height:1.7;
}
</style>
</head>
<body>
  <div class="card">
    <img src="https://p1.ikotech.in/logo.png" alt="profes logo">
    <h1>You are offline.</h1>
    <p>The profes dashboard will open again once your internet connection is back.</p>
  </div>
</body>
</html>
